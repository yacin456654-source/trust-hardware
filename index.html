<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST HARDWARE DJELFA | ثقة وضمان</title>
    <link rel="icon" type="image/jpg" href="https://scontent.floo1-2.fna.fbcdn.net/v/t39.30808-1/682006759_122095180376344266_5380399349240977356_n.jpg?stp=dst-jpg_s160x160_tt6&_nc_cat=104&ccb=1-7&_nc_sid=1d2534&_nc_ohc=F8ArBc2in4EQ7kNvwE59jEr&_nc_oc=AdqSQL9UW2FqvMmynIS3b37eom0-7urCMfI_exNmQI6jFgPBaGKlTXf6n0n4kbbp_E0&_nc_zt=24&_nc_ht=scontent.floo1-2.fna&_nc_gid=Tn2WacjLMDww-TRhwhXfBA&_nc_ss=7b2a8&oh=00_Af3Zi8oEiwkhfktys-FC-pbJ5jPVQXbpR0mp8Sju-TaCTg&oe=69F59C1A">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- مكتبة القص -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .product-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: 0.3s; }
        .product-card:hover { border-color: #f59e0b; transform: translateY(-5px); }
        .cart-badge { position: fixed; bottom: 20px; left: 20px; background: #f59e0b; color: black; padding: 15px 25px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; }
        .admin-section { display: none; background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid #f59e0b; margin: 20px auto; max-width: 1300px; }
        .order-input { color: black !important; background: white !important; font-weight: bold; border: 2px solid #334155; padding: 10px; border-radius: 8px; width: 100%; }
        .cat-btn { background: #334155; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .cat-btn.active { background: #f59e0b; color: black; font-weight: bold; }
        .secret-trigger { width: 30px; height: 30px; background: #f59e0b; border-radius: 8px; cursor: pointer; opacity: 0.1; }
        #cropper-wrapper { display: none; margin: 15px 0; background: #000; border-radius: 8px; overflow: hidden; }
        #image-to-crop { max-width: 100%; display: block; }
    </style>
</head>
<body>

    <!-- الهيدر مع اللوجو والبحث -->
    <header class="bg-slate-900 border-b border-amber-500 sticky top-0 z-50 p-3 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
                <div class="flex items-center gap-3">
                    <img src="https://scontent.floo1-2.fna.fbcdn.net/v/t39.30808-1/682006759_122095180376344266_5380399349240977356_n.jpg?stp=dst-jpg_s160x160_tt6&_nc_cat=104&ccb=1-7&_nc_sid=1d2534&_nc_ohc=F8ArBc2in4EQ7kNvwE59jEr&_nc_oc=AdqSQL9UW2FqvMmynIS3b37eom0-7urCMfI_exNmQI6jFgPBaGKlTXf6n0n4kbbp_E0&_nc_zt=24&_nc_ht=scontent.floo1-2.fna&_nc_gid=Tn2WacjLMDww-TRhwhXfBA&_nc_ss=7b2a8&oh=00_Af3Zi8oEiwkhfktys-FC-pbJ5jPVQXbpR0mp8Sju-TaCTg&oe=69F59C1A" class="h-12 w-12 rounded-full border border-amber-500">
                    <div>
                        <h1 class="text-lg font-bold text-amber-500 leading-none uppercase">TRUST HARDWARE DJELFA</h1>
                        <div class="mt-1 flex flex-col text-[11px] text-slate-300">
                            <span><i class="fas fa-phone-alt text-amber-500 ml-1"></i> 0659992619</span>
                            <a href="https://www.facebook.com/profile.php?id=61560327990792" target="_blank" class="hover:text-amber-500 transition"><i class="fab fa-facebook text-amber-500 ml-1"></i> صفحتنا على الفيسبوك</a>
                        </div>
                    </div>
                </div>
                <div onclick="handleSecretClick()" class="secret-trigger"></div>
            </div>
            <div class="flex-1 max-w-lg relative w-full">
                <input type="text" id="mainSearch" onkeyup="renderProducts()" placeholder="ابحث عن أداة..." class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 px-10 focus:border-amber-500 outline-none text-white text-center">
                <i class="fas fa-search absolute right-4 top-3 text-slate-500"></i>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 mt-6 overflow-x-auto text-center">
        <div id="categories-bar" class="flex gap-3 justify-start md:justify-center pb-2"></div>
    </div>

    <!-- لوحة التحكم الكاملة -->
    <section id="admin-panel" class="container mx-auto admin-section shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
            <h2 class="text-2xl font-bold text-amber-500">لوحة التحكم الذكية</h2>
            <button onclick="closeAdmin()" class="bg-red-600 px-4 py-1 rounded text-sm">إغلاق</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <!-- إدارة السلع -->
                <div id="product-form-container" class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p id="form-title" class="text-xs text-amber-400 font-bold mb-2 uppercase">إضافة / تعديل منتج:</p>
                    <div id="cat-checkboxes" class="grid grid-cols-2 gap-2 mb-3 bg-slate-900 p-2 rounded max-h-32 overflow-y-auto"></div>
                    <input type="text" id="p-name" placeholder="اسم السلعة" class="order-input mb-2">
                    <input type="number" id="p-price" placeholder="السعر د.ج" class="order-input mb-2">
                    <input type="text" id="p-img" onchange="startCropping(this.value)" placeholder="رابط الصورة للقص" class="order-input mb-2">
                    
                    <div id="cropper-wrapper">
                        <img id="image-to-crop">
                        <button onclick="confirmCrop()" class="w-full bg-green-600 py-2 text-white font-bold">تأكيد القص</button>
                    </div>

                    <input type="hidden" id="edit-product-id">
                    <input type="hidden" id="cropped-image-data">

                    <div class="flex gap-2 mt-4">
                        <button id="submit-btn" onclick="saveProduct()" class="flex-1 bg-amber-500 text-black py-3 rounded-lg font-bold">حفظ المنتج</button>
                        <button id="cancel-edit" onclick="resetForm()" class="hidden bg-slate-600 px-4 rounded-lg text-sm">إلغاء</button>
                    </div>
                </div>

                <div class="bg-slate-800 p-4 rounded-xl border border-amber-500/30">
                    <p class="text-xs text-amber-400 font-bold mb-2 uppercase">المجلدات:</p>
                    <div class="flex gap-2">
                        <input type="text" id="new-cat-name" placeholder="اسم المجلد" class="order-input">
                        <button onclick="addNewCategory()" class="bg-blue-600 px-4 rounded-lg font-bold">إضافة</button>
                    </div>
                    <div id="admin-cats-manage" class="flex flex-wrap gap-2 mt-3"></div>
                </div>
                
                <!-- قائمة السلع الحالية للتعديل -->
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-amber-500 font-bold mb-4">السلع الحالية:</h3>
                    <div id="admin-products-list" class="space-y-2 max-h-60 overflow-y-auto"></div>
                </div>
            </div>

            <!-- قائمة الطلبات الواردة (تم استرجاعها) -->
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                <h3 class="text-amber-500 font-bold mb-4 underline">الطلبات الواردة:</h3>
                <div id="orders-list" class="space-y-4 max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-4 py-8">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </main>

    <div id="cart-badge" class="cart-badge" onclick="alert('سيتم تفعيل السلة بالكامل قريباً')">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span> | <span id="cart-total">0</span> د.ج
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBDxdhBktG-DanMbZq8k7cVg7bgY3NnQkk",
            authDomain: "trust-hardware.firebaseapp.com",
            databaseURL: "https://trust-hardware-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "trust-hardware",
            storageBucket: "trust-hardware.firebasestorage.app",
            messagingSenderId: "801438773757",
            appId: "1:801438773757:web:85c57fcfdd13c0eaf3a994"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = {}, allCategories = {}, cropper, currentFilter = 'all', clickCount = 0;

        // نظام القص
        function startCropping(url) {
            if (!url) return;
            document.getElementById('cropper-wrapper').style.display = 'block';
            const img = document.getElementById('image-to-crop');
            img.src = url;
            if (cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
        }

        function confirmCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 500, height: 500 });
            document.getElementById('cropped-image-data').value = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById('cropper-wrapper').style.display = 'none';
            alert("تم القص بنجاح!");
        }

        // جلب البيانات
        db.ref('categories').on('value', (snap) => {
            allCategories = snap.val() || {};
            renderCategories();
            updateCatCheckboxes();
            renderAdminCats();
        });

        db.ref('products').on('value', (snap) => {
            allProducts = snap.val() || {};
            renderProducts();
            renderAdminProducts();
        });

        // الطلبات
        db.ref('orders').on('value', (snap) => {
            const orders = snap.val() || {};
            const list = document.getElementById('orders-list');
            list.innerHTML = Object.keys(orders).map(id => `
                <div class="bg-slate-800 p-4 rounded-lg border-r-4 border-amber-500">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="font-bold text-amber-500">${orders[id].name}</span>
                        <span>${orders[id].phone}</span>
                    </div>
                    <p class="text-xs text-slate-400 mb-2">${orders[id].address}</p>
                    <div class="text-[11px] text-slate-300 bg-black/30 p-2 rounded">${orders[id].items}</div>
                    <button onclick="db.ref('orders/${id}').remove()" class="mt-2 text-red-500 text-xs">حذف الطلب</button>
                </div>
            `).join('');
        });

        // الحفظ والتعديل
        function saveProduct() {
            const id = document.getElementById('edit-product-id').value;
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('cropped-image-data').value || document.getElementById('p-img').value;
            const cats = Array.from(document.querySelectorAll('input[name="p-cats"]:checked')).map(cb => cb.value);

            if(name && price && cats.length > 0 && img) {
                const data = { name, price, img, categories: cats };
                if(id) db.ref('products/' + id).update(data);
                else db.ref('products').push(data);
                resetForm();
            } else {
                alert("أكمل البيانات أولاً!");
            }
        }

        function editProduct(id) {
            const p = allProducts[id];
            document.getElementById('edit-product-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = p.img.startsWith('data') ? "صورة مقصوصة" : p.img;
            document.getElementById('form-title').innerText = "تعديل: " + p.name;
            document.getElementById('submit-btn').innerText = "تحديث";
            document.getElementById('cancel-edit').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetForm() {
            document.getElementById('edit-product-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('cropped-image-data').value = "";
            document.getElementById('form-title').innerText = "إضافة / تعديل منتج:";
            document.getElementById('submit-btn').innerText = "حفظ المنتج";
            document.getElementById('cancel-edit').classList.add('hidden');
            document.querySelectorAll('input[name="p-cats"]').forEach(cb => cb.checked = false);
        }

        // الرندرة
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            grid.innerHTML = Object.keys(allProducts).map(id => {
                const p = allProducts[id];
                if(p.name.toLowerCase().includes(search) && (currentFilter === 'all' || (p.categories && p.categories.includes(currentFilter)))) {
                    return `
                        <div class="product-card p-4 text-center">
                            <img src="${p.img}" class="h-32 mx-auto mb-3 object-contain bg-white rounded p-2">
                            <h3 class="font-bold text-sm h-10 overflow-hidden">${p.name}</h3>
                            <p class="text-amber-500 font-bold text-lg my-2">${p.price} د.ج</p>
                            <button class="w-full bg-amber-500 text-black font-bold py-2 rounded-lg text-xs">أضف للسلة</button>
                        </div>`;
                }
                return '';
            }).join('');
        }

        function renderAdminProducts() {
            document.getElementById('admin-products-list').innerHTML = Object.keys(allProducts).map(id => `
                <div class="flex justify-between items-center bg-slate-900 p-2 rounded">
                    <span class="text-xs truncate w-32">${allProducts[id].name}</span>
                    <div class="flex gap-2">
                        <button onclick="editProduct('${id}')" class="text-blue-400 text-xs">تعديل</button>
                        <button onclick="db.ref('products/${id}').remove()" class="text-red-500 text-xs">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const bar = document.getElementById('categories-bar');
            let html = `<div onclick="setFilter('all')" class="cat-btn ${currentFilter==='all'?'active':''}">الكل</div>`;
            Object.values(allCategories).forEach(c => html += `<div onclick="setFilter('${c}')" class="cat-btn ${currentFilter===c?'active':''}">${c}</div>`);
            bar.innerHTML = html;
        }

        function updateCatCheckboxes() {
            document.getElementById('cat-checkboxes').innerHTML = Object.values(allCategories).map(c => `
                <label class="flex items-center gap-2 text-xs p-1"><input type="checkbox" name="p-cats" value="${c}"> ${c}</label>
            `).join('');
        }

        function renderAdminCats() {
            document.getElementById('admin-cats-manage').innerHTML = Object.keys(allCategories).map(id => `
                <div class="bg-slate-700 px-2 py-1 rounded-full text-[10px] flex gap-2">
                    ${allCategories[id]} <button onclick="db.ref('categories/${id}').remove()" class="text-red-400">x</button>
                </div>
            `).join('');
        }

        function setFilter(c) { currentFilter = c; renderCategories(); renderProducts(); }
        function addNewCategory() { const v = document.getElementById('new-cat-name').value; if(v){db.ref('categories').push(v); document.getElementById('new-cat-name').value="";}}
        function handleSecretClick() { clickCount++; if(clickCount === 5){ if(prompt("كلمة السر:") === "yacin..yacin.") document.getElementById('admin-panel').style.display='block'; clickCount=0; } }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    </script>
</body>
</html>
