<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST HARDWARE DJELFA | إدارة المنتجات</title>
    
    <!-- المكتبات الأساسية -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- مكتبة قص الصور -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .product-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: 0.3s; }
        .admin-section { display: none; background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid #f59e0b; margin: 20px auto; max-width: 1300px; }
        .order-input { color: black !important; background: white !important; font-weight: bold; border: 2px solid #334155; padding: 10px; border-radius: 8px; width: 100%; }
        .cat-btn { background: #334155; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .cat-btn.active { background: #f59e0b; color: black; font-weight: bold; }
        #cropper-wrapper { display: none; margin: 15px 0; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
        #image-to-crop { max-width: 100%; display: block; }
        .secret-trigger { width: 30px; height: 30px; background: #f59e0b; border-radius: 8px; cursor: pointer; opacity: 0.1; }
    </style>
</head>
<body>

    <header class="bg-slate-900 border-b border-amber-500 sticky top-0 z-50 p-3 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <h1 class="text-lg font-bold text-amber-500 uppercase">TRUST HARDWARE DJELFA</h1>
                <div onclick="handleSecretClick()" class="secret-trigger"></div>
            </div>
            <div class="flex-1 max-w-lg relative w-full">
                <input type="text" id="mainSearch" onkeyup="renderProducts()" placeholder="ابحث عن أداة..." class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 px-10 outline-none text-white text-center">
            </div>
        </div>
    </header>

    <!-- شريط المجلدات -->
    <div class="container mx-auto px-4 mt-6 overflow-x-auto text-center">
        <div id="categories-bar" class="flex gap-3 justify-start md:justify-center pb-2"></div>
    </div>

    <!-- لوحة التحكم -->
    <section id="admin-panel" class="container mx-auto admin-section shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
            <h2 class="text-2xl font-bold text-amber-500">لوحة التحكم</h2>
            <button onclick="closeAdmin()" class="bg-red-600 px-4 py-1 rounded text-sm">إغلاق</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <!-- فورم الإضافة والتعديل -->
                <div id="product-form-container" class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p id="form-title" class="text-xs text-amber-400 font-bold mb-2 uppercase">إضافة منتج جديد:</p>
                    <div id="cat-checkboxes" class="grid grid-cols-2 gap-2 mb-3 bg-slate-900 p-2 rounded max-h-32 overflow-y-auto"></div>
                    
                    <input type="text" id="p-name" placeholder="اسم السلعة" class="order-input mb-2">
                    <input type="number" id="p-price" placeholder="السعر د.ج" class="order-input mb-2">
                    <input type="text" id="p-img" onchange="startCropping(this.value)" placeholder="رابط الصورة (سيفتح القص تلقائياً)" class="order-input mb-2">
                    
                    <div id="cropper-wrapper">
                        <img id="image-to-crop">
                        <button onclick="confirmCrop()" class="w-full bg-green-600 py-2 text-white font-bold">تأكيد القص</button>
                    </div>

                    <input type="hidden" id="edit-product-id">
                    <input type="hidden" id="cropped-image-data">

                    <div class="flex gap-2 mt-4">
                        <button id="submit-btn" onclick="saveProduct()" class="flex-1 bg-amber-500 text-black py-3 rounded-lg font-bold">نشر المنتج</button>
                        <button id="cancel-edit-btn" onclick="resetForm()" class="hidden bg-slate-600 px-4 rounded-lg text-sm">إلغاء التعديل</button>
                    </div>
                </div>

                <!-- إدارة المجلدات -->
                <div class="bg-slate-800 p-4 rounded-xl border border-amber-500/30">
                    <p class="text-xs text-amber-400 font-bold mb-2 uppercase">المجلدات:</p>
                    <div class="flex gap-2">
                        <input type="text" id="new-cat-name" placeholder="اسم المجلد" class="order-input">
                        <button onclick="addNewCategory()" class="bg-blue-600 px-4 rounded-lg font-bold">إضافة</button>
                    </div>
                    <div id="admin-cats-manage" class="flex flex-wrap gap-2 mt-3"></div>
                </div>
            </div>

            <!-- إدارة السلع الحالية (تعديل وحذف) -->
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                <h3 class="text-amber-500 font-bold mb-4 border-b border-slate-700 pb-2">السلع المعروضة (تعديل/حذف):</h3>
                <div id="admin-products-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </section>

    <!-- عرض المنتجات للزوار -->
    <main class="container mx-auto px-4 py-8">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDxdhBktG-DanMbZq8k7cVg7bgY3NnQkk",
            authDomain: "trust-hardware.firebaseapp.com",
            databaseURL: "https://trust-hardware-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "trust-hardware",
            storageBucket: "trust-hardware.firebasestorage.app",
            messagingSenderId: "801438773757",
            appId: "1:801438773757:web:85c57fcfdd13c0eaf3a994"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = {};
        let allCategories = {};
        let cropper;
        let currentFilter = 'all';
        let clickCount = 0;

        // --- نظام القص ---
        function startCropping(url) {
            if (!url) return;
            const wrapper = document.getElementById('cropper-wrapper');
            const img = document.getElementById('image-to-crop');
            wrapper.style.display = 'block';
            img.src = url;
            if (cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
        }

        function confirmCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 500, height: 500 });
            document.getElementById('cropped-image-data').value = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById('cropper-wrapper').style.display = 'none';
            alert("تم تجهيز الصورة المقصوصة بنجاح.");
        }

        // --- نظام البيانات ---
        db.ref('categories').on('value', (snap) => {
            allCategories = snap.val() || {};
            renderCategories();
            updateCatCheckboxes();
            renderAdminCats();
        });

        db.ref('products').on('value', (snap) => {
            allProducts = snap.val() || {};
            renderProducts();
            renderAdminProducts();
        });

        function saveProduct() {
            const id = document.getElementById('edit-product-id').value;
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const croppedImg = document.getElementById('cropped-image-data').value;
            const originalImg = document.getElementById('p-img').value;
            const cats = Array.from(document.querySelectorAll('input[name="p-cats"]:checked')).map(cb => cb.value);

            const finalImg = croppedImg || originalImg;

            if(!name || !price || cats.length === 0 || !finalImg) {
                alert("يرجى إكمال جميع الخانات (الاسم، السعر، المجلد، والصورة)");
                return;
            }

            const data = { name, price, img: finalImg, categories: cats };

            if(id) {
                db.ref('products/' + id).update(data).then(() => alert("تم التعديل!"));
            } else {
                db.ref('products').push(data).then(() => alert("تم النشر!"));
            }
            resetForm();
        }

        function editProduct(id) {
            const p = allProducts[id];
            document.getElementById('edit-product-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = p.img.startsWith('data:') ? "صورة مقصوصة مخزنة" : p.img;
            
            // تحديد المجلدات
            document.querySelectorAll('input[name="p-cats"]').forEach(cb => {
                cb.checked = p.categories && p.categories.includes(cb.value);
            });

            document.getElementById('form-title').innerText = "تعديل المنتج: " + p.name;
            document.getElementById('submit-btn').innerText = "حفظ التعديلات";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function deleteProduct(id) {
            if(confirm("هل أنت متأكد من حذف هذه السلعة نهائياً؟")) {
                db.ref('products/' + id).remove();
            }
        }

        function resetForm() {
            document.getElementById('edit-product-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('cropped-image-data').value = "";
            document.getElementById('form-title').innerText = "إضافة منتج جديد:";
            document.getElementById('submit-btn').innerText = "نشر المنتج";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            document.querySelectorAll('input[name="p-cats"]').forEach(cb => cb.checked = false);
            if(cropper) cropper.destroy();
            document.getElementById('cropper-wrapper').style.display = 'none';
        }

        // --- وظائف العرض ---
        function renderAdminProducts() {
            const container = document.getElementById('admin-products-list');
            let html = "";
            Object.keys(allProducts).forEach(id => {
                const p = allProducts[id];
                html += `
                    <div class="flex items-center gap-3 bg-slate-800 p-2 rounded-lg border border-slate-700">
                        <img src="${p.img}" class="w-12 h-12 rounded object-cover bg-white">
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold truncate">${p.name}</p>
                            <p class="text-amber-500 text-xs">${p.price} د.ج</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProduct('${id}')" class="text-blue-400 p-2 hover:bg-blue-400/10 rounded"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteProduct('${id}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html || "<p class='text-center text-slate-500'>لا توجد منتجات حالياً</p>";
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            let html = "";
            Object.keys(allProducts).forEach(id => {
                const p = allProducts[id];
                const matchesSearch = p.name.toLowerCase().includes(search);
                const matchesCat = currentFilter === 'all' || (p.categories && p.categories.includes(currentFilter));
                
                if(matchesSearch && matchesCat) {
                    html += `
                        <div class="product-card p-4 text-center">
                            <img src="${p.img}" class="h-40 w-full object-contain bg-white rounded-lg mb-3">
                            <h3 class="font-bold text-sm mb-2 h-10 overflow-hidden">${p.name}</h3>
                            <p class="text-amber-500 font-bold text-lg">${p.price} د.ج</p>
                            <button class="w-full bg-amber-500 text-black font-bold py-2 mt-3 rounded-lg text-xs">أضف للسلة</button>
                        </div>`;
                }
            });
            grid.innerHTML = html;
        }

        function renderCategories() {
            const bar = document.getElementById('categories-bar');
            let html = `<div onclick="setFilter('all')" class="cat-btn ${currentFilter==='all'?'active':''}">الكل</div>`;
            Object.values(allCategories).forEach(name => {
                html += `<div onclick="setFilter('${name}')" class="cat-btn ${currentFilter===name?'active':''}">${name}</div>`;
            });
            bar.innerHTML = html;
        }

        function setFilter(cat) { currentFilter = cat; renderCategories(); renderProducts(); }
        
        function updateCatCheckboxes() {
            const container = document.getElementById('cat-checkboxes');
            container.innerHTML = Object.values(allCategories).map(name => `
                <label class="flex items-center gap-2 text-xs bg-slate-800 p-1 rounded cursor-pointer">
                    <input type="checkbox" name="p-cats" value="${name}"> ${name}
                </label>`).join('');
        }

        function renderAdminCats() {
            document.getElementById('admin-cats-manage').innerHTML = Object.keys(allCategories).map(id => `
                <div class="flex items-center gap-2 bg-slate-700 px-3 py-1 rounded-full text-xs">
                    <span>${allCategories[id]}</span>
                    <button onclick="db.ref('categories/${id}').remove()" class="text-red-500"><i class="fas fa-times"></i></button>
                </div>`).join('');
        }

        function addNewCategory() {
            const val = document.getElementById('new-cat-name').value;
            if(val) { db.ref('categories').push(val); document.getElementById('new-cat-name').value = ""; }
        }

        function handleSecretClick() {
            clickCount++;
            if (clickCount === 5) {
                if(prompt("كلمة السر الإدارية:") === "yacin..yacin.") {
                    document.getElementById('admin-panel').style.display = 'block';
                }
                clickCount = 0;
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    </script>
</body>
</html>
