<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST HARDWARE DJELFA</title>
    <!-- المكاتب -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .order-input { color: #000 !important; background: #fff !important; width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 2px solid #ccc; }
        .admin-section { display: none; background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #f59e0b; margin: 20px; }
        #cropper-wrapper { display: none; margin: 15px 0; background: #000; border-radius: 8px; overflow: hidden; }
        #image-to-crop { max-width: 100%; display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .cat-btn { background: #334155; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .cat-btn.active { background: #f59e0b; color: #000; }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header class="bg-slate-900 border-b border-amber-500 p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://scontent.floo1-2.fna.fbcdn.net/v/t39.30808-1/682006759_122095180376344266_5380399349240977356_n.jpg?stp=dst-jpg_s160x160_tt6&_nc_cat=104&ccb=1-7&_nc_sid=1d2534&_nc_ohc=F8ArBc2in4EQ7kNvwE59jEr&_nc_oc=AdqSQL9UW2FqvMmynIS3b37eom0-7urCMfI_exNmQI6jFgPBaGKlTXf6n0n4kbbp_E0&_nc_zt=24&_nc_ht=scontent.floo1-2.fna&_nc_gid=Tn2WacjLMDww-TRhwhXfBA&_nc_ss=7b2a8&oh=00_Af3Zi8oEiwkhfktys-FC-pbJ5jPVQXbpR0mp8Sju-TaCTg&oe=69F59C1A" class="h-10 w-10 rounded-full border border-amber-500">
                <h1 class="text-amber-500 font-bold uppercase hidden md:block">TRUST HARDWARE DJELFA</h1>
            </div>
            <div onclick="handleSecretClick()" class="w-8 h-8 opacity-5 cursor-pointer bg-amber-500 rounded"></div>
            <input type="text" id="mainSearch" onkeyup="renderProducts()" placeholder="ابحث هنا..." class="bg-slate-800 border border-slate-700 rounded-full px-4 py-1 text-sm text-center focus:outline-none">
        </div>
    </header>

    <!-- شريط المجلدات -->
    <div id="categories-bar" class="flex gap-2 p-4 overflow-x-auto justify-center"></div>

    <!-- لوحة التحكم -->
    <section id="admin-panel" class="admin-section">
        <div class="flex justify-between mb-4">
            <h2 class="text-xl font-bold text-amber-500 italic underline">لوحة التحكم الإدارية</h2>
            <button onclick="closeAdmin()" class="bg-red-600 px-3 py-1 rounded text-xs">إغلاق</button>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- إضافة منتج -->
            <div class="bg-slate-800 p-4 rounded-lg">
                <h3 id="form-title" class="text-sm font-bold text-amber-400 mb-3">إضافة سلعة جديدة:</h3>
                <div id="cat-checkboxes" class="flex flex-wrap gap-2 mb-3 bg-slate-900 p-2 rounded border border-slate-700"></div>
                
                <input type="text" id="p-name" placeholder="اسم السلعة" class="order-input">
                <input type="number" id="p-price" placeholder="السعر" class="order-input">
                <input type="text" id="p-img" onchange="startCropping(this.value)" placeholder="رابط الصورة (سيفتح القص تلقائياً)" class="order-input">
                
                <!-- منطقة القص -->
                <div id="cropper-wrapper">
                    <p class="text-[10px] text-center text-amber-500 mb-1">قم بتحريك الصورة لضبط القياس المربع</p>
                    <img id="image-to-crop">
                    <button onclick="confirmCrop()" class="w-full bg-green-600 py-2 text-white font-bold mt-2">تأكيد القص</button>
                </div>

                <input type="hidden" id="edit-product-id">
                <input type="hidden" id="cropped-image-data">

                <button id="submit-btn" onclick="saveProduct()" class="w-full bg-amber-500 text-black font-bold py-3 rounded mt-2">حفظ ونشر</button>
                <button id="cancel-edit" onclick="resetForm()" class="hidden w-full bg-slate-600 py-2 mt-2 rounded">إلغاء التعديل</button>
            </div>

            <!-- الطلبات الواردة -->
            <div class="bg-slate-900 p-4 rounded-lg">
                <h3 class="text-amber-500 font-bold mb-3 border-b border-slate-700 pb-2">الطلبات الواردة من الزبائن:</h3>
                <div id="orders-list" class="space-y-3 max-h-[400px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- إدارة المنتجات الحالية -->
        <div class="mt-6">
            <h3 class="text-amber-500 font-bold mb-2">تعديل/حذف المنتجات الحالية:</h3>
            <div id="admin-products-list" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>
        </div>
    </section>

    <!-- عرض المنتجات -->
    <main class="container mx-auto p-4">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <!-- سلة التسوق -->
    <div id="cart-badge" class="fixed bottom-5 left-5 bg-amber-500 text-black px-5 py-3 rounded-full font-bold cursor-pointer shadow-2xl z-50" onclick="toggleCart()">
        <i class="fas fa-shopping-basket ml-2"></i> <span id="cart-count">0</span> سلعة
    </div>

    <!-- مودال السلة -->
    <div id="cart-modal" class="modal">
        <div class="bg-slate-800 p-6 rounded-xl w-80">
            <h2 class="text-amber-500 font-bold mb-4">تأكيد الطلبية</h2>
            <div id="cart-items" class="text-xs space-y-2 mb-4 max-h-40 overflow-y-auto"></div>
            <input type="text" id="cust-name" placeholder="اسمك الكامل" class="order-input">
            <input type="text" id="cust-phone" placeholder="رقم هاتفك" class="order-input">
            <p class="text-center font-bold text-amber-500 mb-4">الإجمالي: <span id="cart-total">0</span> د.ج</p>
            <button onclick="sendOrder()" class="w-full bg-green-600 py-2 rounded font-bold">إرسال الطلب</button>
            <button onclick="toggleCart()" class="w-full mt-2 text-slate-400 text-sm">إلغاء</button>
        </div>
    </div>

    <script>
        // تكوين Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBDxdhBktG-DanMbZq8k7cVg7bgY3NnQkk",
            authDomain: "trust-hardware.firebaseapp.com",
            databaseURL: "https://trust-hardware-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "trust-hardware",
            storageBucket: "trust-hardware.firebasestorage.app",
            messagingSenderId: "801438773757",
            appId: "1:801438773757:web:85c57fcfdd13c0eaf3a994"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = {}, allCategories = {}, cart = [], cropper, currentFilter = 'all', clickCount = 0;

        // نظام القص
        function startCropping(url) {
            if (!url || url === "صورة مخزنة") return;
            document.getElementById('cropper-wrapper').style.display = 'block';
            const img = document.getElementById('image-to-crop');
            img.src = url;
            if (cropper) cropper.destroy();
            setTimeout(() => {
                cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
            }, 200);
        }

        function confirmCrop() {
            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
            document.getElementById('cropped-image-data').value = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('cropper-wrapper').style.display = 'none';
            alert("تم قص الصورة بنجاح!");
        }

        // جلب البيانات
        db.ref('categories').on('value', snap => {
            allCategories = snap.val() || {};
            renderCategories();
            updateCatCheckboxes();
        });

        db.ref('products').on('value', snap => {
            allProducts = snap.val() || {};
            renderProducts();
            renderAdminProducts();
        });

        // إصلاح خطأ undefined في الاسم
        db.ref('orders').on('value', snap => {
            const orders = snap.val() || {};
            const list = document.getElementById('orders-list');
            list.innerHTML = Object.keys(orders).map(id => `
                <div class="bg-slate-800 p-3 rounded border-r-4 border-amber-500 text-xs">
                    <div class="flex justify-between font-bold text-amber-500">
                        <span>الزبون: ${orders[id].customer_name || 'غير معروف'}</span>
                        <span>${orders[id].customer_phone || ''}</span>
                    </div>
                    <p class="text-slate-300 mt-1">${orders[id].items_list}</p>
                    <div class="flex justify-between mt-2 items-center">
                        <span class="text-green-500">${orders[id].total_price} د.ج</span>
                        <button onclick="db.ref('orders/${id}').remove()" class="text-red-500 underline">تم التسليم</button>
                    </div>
                </div>
            `).join('');
        });

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            grid.innerHTML = Object.keys(allProducts).map(id => {
                const p = allProducts[id];
                if ((currentFilter === 'all' || (p.categories && p.categories.includes(currentFilter))) && 
                    p.name.toLowerCase().includes(search)) {
                    return `
                        <div class="bg-slate-800 p-3 rounded-lg flex flex-col border border-slate-700">
                            <img src="${p.img}" class="h-28 object-contain bg-white rounded mb-2">
                            <h3 class="text-[11px] font-bold h-8 overflow-hidden">${p.name}</h3>
                            <p class="text-amber-500 font-bold my-2 text-sm">${p.price} د.ج</p>
                            <button onclick="addToCart('${id}')" class="bg-amber-500 text-black text-[10px] py-2 rounded font-bold">أضف للسلة</button>
                        </div>`;
                }
            }).join('');
        }

        function saveProduct() {
            const id = document.getElementById('edit-product-id').value;
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const cropped = document.getElementById('cropped-image-data').value;
            const original = document.getElementById('p-img').value;
            const cats = Array.from(document.querySelectorAll('input[name="p-cats"]:checked')).map(cb => cb.value);

            let imgToSave;
            if (id) {
                // في حالة التعديل، إذا تم قص صورة جديدة نأخذها، وإلا نبقي القديمة
                imgToSave = cropped || allProducts[id].img;
            } else {
                imgToSave = cropped || original;
            }

            if(name && price && imgToSave && cats.length > 0) {
                const data = { name, price, img: imgToSave, categories: cats };
                if(id) db.ref('products/' + id).update(data);
                else db.ref('products').push(data);
                resetForm();
                alert("تم الحفظ بنجاح!");
            } else {
                alert("يرجى إكمال البيانات (الاسم، السعر، الصورة، والمجلد)");
            }
        }

        function editProduct(id) {
            const p = allProducts[id];
            document.getElementById('edit-product-id').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = "صورة مخزنة";
            document.getElementById('form-title').innerText = "تعديل: " + p.name;
            document.getElementById('submit-btn').innerText = "تحديث التعديلات";
            document.getElementById('cancel-edit').classList.remove('hidden');
            
            // لإتاحة إعادة قص الصورة عند التعديل
            const pImgInput = document.getElementById('p-img');
            pImgInput.onclick = function() { this.value = ""; }; // تفريغ الخانة عند النقر لتسهيل وضع رابط جديد

            document.querySelectorAll('input[name="p-cats"]').forEach(cb => {
                cb.checked = p.categories && p.categories.includes(cb.value);
            });
            window.scrollTo(0, 0);
        }

        function resetForm() {
            document.getElementById('edit-product-id').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('cropped-image-data').value = "";
            document.getElementById('form-title').innerText = "إضافة سلعة جديدة:";
            document.getElementById('submit-btn').innerText = "حفظ ونشر";
            document.getElementById('cancel-edit').classList.add('hidden');
            document.querySelectorAll('input[name="p-cats"]').forEach(cb => cb.checked = false);
            document.getElementById('cropper-wrapper').style.display = 'none';
        }

        function renderAdminProducts() {
            document.getElementById('admin-products-list').innerHTML = Object.keys(allProducts).map(id => `
                <div class="bg-slate-900 p-2 rounded text-[10px] flex flex-col gap-1">
                    <span class="truncate">${allProducts[id].name}</span>
                    <div class="flex gap-2">
                        <button onclick="editProduct('${id}')" class="text-blue-400">تعديل</button>
                        <button onclick="if(confirm('حذف؟')) db.ref('products/${id}').remove()" class="text-red-500">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const bar = document.getElementById('categories-bar');
            let html = `<div onclick="setFilter('all')" class="cat-btn ${currentFilter === 'all' ? 'active' : ''}">الكل</div>`;
            Object.values(allCategories).forEach(c => {
                html += `<div onclick="setFilter('${c}')" class="cat-btn ${currentFilter === c ? 'active' : ''}">${c}</div>`;
            });
            bar.innerHTML = html;
        }

        function updateCatCheckboxes() {
            document.getElementById('cat-checkboxes').innerHTML = Object.values(allCategories).map(c => `
                <label class="text-[10px] flex items-center gap-1"><input type="checkbox" name="p-cats" value="${c}"> ${c}</label>
            `).join('');
        }

        function setFilter(c) { currentFilter = c; renderCategories(); renderProducts(); }

        function addToCart(id) { cart.push(allProducts[id]); updateCartUI(); }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, i) => s + parseInt(i.price), 0);
            document.getElementById('cart-total').innerText = total;
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between border-b border-slate-700 pb-1">
                    <span>${i.name}</span>
                    <button onclick="cart.splice(${idx},1);updateCartUI()" class="text-red-500">X</button>
                </div>
            `).join('');
        }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const total = document.getElementById('cart-total').innerText;
            if(name && phone && cart.length > 0) {
                const list = cart.map(i => i.name).join(' + ');
                db.ref('orders').push({
                    customer_name: name,
                    customer_phone: phone,
                    items_list: list,
                    total_price: total
                });
                alert("تم الإرسال!");
                cart = []; updateCartUI(); toggleCart();
            } else {
                alert("أكمل بياناتك!");
            }
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function handleSecretClick() {
            clickCount++;
            if(clickCount === 5) {
                if(prompt("كلمة السر:") === "yacin..yacin.") {
                    document.getElementById('admin-panel').style.display = 'block';
                }
                clickCount = 0;
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    </script>
</body>
</html>
