<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST HARDWARE DJELFA | ثقة وضمان</title>
    <link rel="icon" type="image/jpg" href="https://scontent.floo1-2.fna.fbcdn.net/v/t39.30808-1/682006759_122095180376344266_5380399349240977356_n.jpg?stp=dst-jpg_s160x160_tt6&_nc_cat=104&ccb=1-7&_nc_sid=1d2534&_nc_ohc=F8ArBc2in4EQ7kNvwE59jEr&_nc_oc=AdqSQL9UW2FqvMmynIS3b37eom0-7urCMfI_exNmQI6jFgPBaGKlTXf6n0n4kbbp_E0&_nc_zt=24&_nc_ht=scontent.floo1-2.fna&_nc_gid=Tn2WacjLMDww-TRhwhXfBA&_nc_ss=7b2a8&oh=00_Af3Zi8oEiwkhfktys-FC-pbJ5jPVQXbpR0mp8Sju-TaCTg&oe=69F59C1A">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:ital@1&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .product-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: 0.3s; }
        .product-card:hover { border-color: #f59e0b; transform: translateY(-5px); }
        .cart-badge { position: fixed; bottom: 20px; left: 20px; background: #f59e0b; color: black; padding: 15px 25px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; overflow-y: auto; }
        .admin-section { display: none; background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid #f59e0b; margin: 20px auto; max-width: 1300px; }
        .order-input { color: black !important; background: white !important; font-weight: bold; border: 2px solid #334155; padding: 10px; border-radius: 8px; width: 100%; }
        .cat-btn { background: #334155; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .cat-btn.active { background: #f59e0b; color: black; font-weight: bold; }
        .secret-trigger { width: 30px; height: 30px; background: #f59e0b; border-radius: 8px; cursor: pointer; opacity: 0.1; transition: 0.3s; }
    </style>
</head>
<body>

    <header class="bg-slate-900 border-b border-amber-500 sticky top-0 z-50 p-3 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
                <div class="flex items-center gap-3">
                    <img src="https://scontent.floo1-2.fna.fbcdn.net/v/t39.30808-1/682006759_122095180376344266_5380399349240977356_n.jpg?stp=dst-jpg_s160x160_tt6&_nc_cat=104&ccb=1-7&_nc_sid=1d2534&_nc_ohc=F8ArBc2in4EQ7kNvwE59jEr&_nc_oc=AdqSQL9UW2FqvMmynIS3b37eom0-7urCMfI_exNmQI6jFgPBaGKlTXf6n0n4kbbp_E0&_nc_zt=24&_nc_ht=scontent.floo1-2.fna&_nc_gid=Tn2WacjLMDww-TRhwhXfBA&_nc_ss=7b2a8&oh=00_Af3Zi8oEiwkhfktys-FC-pbJ5jPVQXbpR0mp8Sju-TaCTg&oe=69F59C1A" class="h-12 w-12 rounded-full border border-amber-500">
                    <div>
                        <h1 class="text-lg font-bold text-amber-500 leading-none uppercase">TRUST HARDWARE DJELFA</h1>
                        <div class="mt-1 flex flex-col text-[11px] text-slate-300">
                            <span><i class="fas fa-phone-alt text-amber-500 ml-1"></i> 0659992619</span>
                            <a href="https://www.facebook.com/profile.php?id=61560327990792" target="_blank" class="hover:text-amber-500 transition">
                                <i class="fab fa-facebook text-amber-500 ml-1"></i> صفحتنا على الفيسبوك
                            </a>
                        </div>
                    </div>
                </div>
                <div onclick="handleSecretClick()" class="secret-trigger"></div>
            </div>

            <div class="flex-1 max-w-lg relative w-full">
                <input type="text" id="mainSearch" onkeyup="filterProducts()" placeholder="ابحث عن أداة..." class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 px-10 focus:border-amber-500 outline-none text-white text-center">
                <i class="fas fa-search absolute right-4 top-3 text-slate-500"></i>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 mt-6 overflow-x-auto">
        <div id="categories-bar" class="flex gap-3 justify-start md:justify-center pb-2"></div>
    </div>

    <section id="admin-panel" class="container mx-auto admin-section shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
            <h2 class="text-2xl font-bold text-amber-500">لوحة التحكم الذكية</h2>
            <button onclick="closeAdmin()" class="bg-red-600 px-4 py-1 rounded text-sm">إغلاق</button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="bg-slate-800 p-4 rounded-xl border border-amber-500/30">
                    <p class="text-xs text-amber-400 font-bold mb-2 uppercase">إدارة المجلدات (إضافة/حذف):</p>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="new-cat-name" placeholder="اسم المجلد الجديد" class="order-input">
                        <button onclick="addNewCategory()" class="bg-blue-600 px-4 rounded-lg font-bold">إضافة</button>
                    </div>
                    <div id="admin-cats-manage" class="flex flex-wrap gap-2 mt-3"></div>
                </div>

                <div id="product-form-container" class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p id="form-title" class="text-xs text-amber-400 font-bold mb-2 uppercase">إضافة منتج جديد:</p>
                    <div id="cat-checkboxes" class="grid grid-cols-2 gap-2 mb-3 bg-slate-900 p-2 rounded max-h-32 overflow-y-auto"></div>
                    <input type="text" id="p-name" placeholder="اسم السلعة" class="order-input mb-2">
                    <input type="number" id="p-price" placeholder="السعر د.ج" class="order-input mb-2">
                    <input type="text" id="p-img" placeholder="رابط الصورة" class="order-input mb-2">
                    <input type="hidden" id="edit-product-id">
                    <div class="flex gap-2">
                        <button id="submit-btn" onclick="saveProduct()" class="flex-1 bg-amber-500 text-black py-3 rounded-lg font-bold">نشر المنتج</button>
                        <button id="cancel-edit" onclick="resetForm()" class="hidden bg-slate-600 px-4 rounded-lg text-sm">إلغاء التعديل</button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
                <h3 class="text-amber-500 font-bold mb-4 underline">الطلبات الواردة:</h3>
                <div id="orders-list" class="space-y-4 max-h-[500px] overflow-y-auto"></div>
            </div>
        </div>

        <div class="mt-8 border-t border-slate-700 pt-4">
            <h3 class="text-amber-500 font-bold mb-4">إدارة وتعديل السلع المعروضة:</h3>
            <div id="admin-products-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </section>

    <main class="container mx-auto px-4 py-8">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </main>

    <div id="cart-badge" class="cart-badge" onclick="openCartModal()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span> | <span id="cart-total">0</span> د.ج
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDxdhBktG-DanMbZq8k7cVg7bgY3NnQkk",
            authDomain: "trust-hardware.firebaseapp.com",
            databaseURL: "https://trust-hardware-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "trust-hardware",
            storageBucket: "trust-hardware.firebasestorage.app",
            messagingSenderId: "801438773757",
            appId: "1:801438773757:web:85c57fcfdd13c0eaf3a994"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = {};
        let allCategories = {};
        let cart = [];
        let currentFilter = 'all';
        let clickCount = 0;

        function handleSecretClick() {
            clickCount++;
            if (clickCount === 5) {
                clickCount = 0;
                if(prompt("كلمة السر الإدارية:") === "yacin..yacin.") {
                    document.getElementById('admin-panel').style.display = 'block';
                    window.scrollTo(0, 0);
                }
            }
            setTimeout(() => { clickCount = 0; }, 3000);
        }

        db.ref('categories').on('value', (snap) => {
            allCategories = snap.val() || {};
            renderCategories();
            updateCatCheckboxes();
            renderAdminCats();
        });

        db.ref('products').on('value', (snap) => {
            allProducts = snap.val() || {};
            renderProducts();
            renderAdminProducts();
        });

        // ميزات المجلدات
        function renderCategories() {
            const bar = document.getElementById('categories-bar');
            let html = `<div onclick="filterByCategory('all')" class="cat-btn ${currentFilter === 'all' ? 'active' : ''}">الكل</div>`;
            Object.keys(allCategories).forEach(id => {
                const name = allCategories[id];
                html += `<div onclick="filterByCategory('${name}')" class="cat-btn ${currentFilter === name ? 'active' : ''}">${name}</div>`;
            });
            bar.innerHTML = html;
        }

        function filterByCategory(cat) { currentFilter = cat; renderProducts(); renderCategories(); }

        function renderAdminCats() {
            const list = document.getElementById('admin-cats-manage');
            let html = "";
            Object.keys(allCategories).forEach(id => {
                html += `
                    <div class="flex items-center gap-2 bg-slate-700 px-3 py-1 rounded-full text-xs">
                        <span>${allCategories[id]}</span>
                        <button onclick="editCategoryName('${id}')" class="text-blue-400"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteCategory('${id}')" class="text-red-500"><i class="fas fa-times"></i></button>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function addNewCategory() {
            const name = document.getElementById('new-cat-name').value;
            if(name) { db.ref('categories').push(name); document.getElementById('new-cat-name').value = ''; }
        }

        function deleteCategory(id) { if(confirm("حذف المجلد؟ لن يتم حذف المنتجات بداخلة.")) db.ref('categories/' + id).remove(); }
        
        function editCategoryName(id) {
            const newName = prompt("الاسم الجديد للمجلد:", allCategories[id]);
            if(newName) db.ref('categories/' + id).set(newName);
        }

        function updateCatCheckboxes() {
            const container = document.getElementById('cat-checkboxes');
            let html = "";
            Object.keys(allCategories).forEach(id => {
                const name = allCategories[id];
                html += `
                    <label class="flex items-center gap-2 text-xs cursor-pointer bg-slate-800 p-1 rounded">
                        <input type="checkbox" name="p-cats" value="${name}"> ${name}
                    </label>`;
            });
            container.innerHTML = html;
        }

        // ميزات المنتجات
        function saveProduct() {
            const n = document.getElementById('p-name').value, 
                  p = document.getElementById('p-price').value, 
                  img = document.getElementById('p-img').value,
                  editId = document.getElementById('edit-product-id').value;

            const selectedCats = Array.from(document.querySelectorAll('input[name="p-cats"]:checked')).map(cb => cb.value);
            
            if(n && p && selectedCats.length > 0) {
                const data = { name: n, price: p, img: img, categories: selectedCats };
                if(editId) {
                    db.ref('products/' + editId).update(data);
                    alert("تم التعديل بنجاح!");
                } else {
                    db.ref('products').push(data);
                    alert("تم النشر بنجاح!");
                }
                resetForm();
            } else {
                alert("يرجى ملء الاسم والسعر واختيار مجلد واحد على الأقل.");
            }
        }

        function editProduct(id) {
            const p = allProducts[id];
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-img').value = p.img || "";
            document.getElementById('edit-product-id').value = id;
            
            // تحديد المربعات
            document.querySelectorAll('input[name="p-cats"]').forEach(cb => {
                cb.checked = p.categories && p.categories.includes(cb.value);
            });

            document.getElementById('form-title').innerText = "تعديل المنتج: " + p.name;
            document.getElementById('submit-btn').innerText = "حفظ التغييرات";
            document.getElementById('cancel-edit').classList.remove('hidden');
            window.scrollTo(0, document.getElementById('product-form-container').offsetTop - 100);
        }

        function resetForm() {
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            document.getElementById('edit-product-id').value = "";
            document.querySelectorAll('input[name="p-cats"]').forEach(cb => cb.checked = false);
            document.getElementById('form-title').innerText = "إضافة منتج جديد:";
            document.getElementById('submit-btn').innerText = "نشر المنتج";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const q = document.getElementById('mainSearch').value.toLowerCase();
            let html = "";
            
            Object.keys(allProducts).forEach(id => {
                const p = allProducts[id];
                const productCats = p.categories || [];
                const matchesCat = currentFilter === 'all' || productCats.includes(currentFilter);
                const matchesSearch = p.name.toLowerCase().includes(q);

                if (matchesCat && matchesSearch) {
                    html += `
                        <div class="product-card p-4 text-center">
                            <div class="flex flex-wrap gap-1 justify-center mb-2">
                                ${productCats.map(c => `<span class="bg-amber-500/10 text-amber-500 text-[8px] px-1 rounded">${c}</span>`).join('')}
                            </div>
                            <img src="${p.img || 'https://via.placeholder.com/150'}" class="h-32 mx-auto mb-3 object-contain bg-white rounded p-2">
                            <h3 class="font-bold text-sm h-10 overflow-hidden">${p.name}</h3>
                            <p class="text-amber-500 font-bold text-lg my-2">${p.price} د.ج</p>
                            <button onclick="addToCart('${id}')" class="w-full bg-amber-500 text-black font-bold py-2 rounded-lg text-xs">أضف للسلة</button>
                        </div>`;
                }
            });
            grid.innerHTML = html;
        }

        function renderAdminProducts() {
            const list = document.getElementById('admin-products-list');
            let html = "";
            Object.keys(allProducts).forEach(id => {
                const p = allProducts[id];
                html += `
                    <div class="bg-slate-800 p-3 rounded-xl border border-slate-700 flex items-center gap-3">
                        <img src="${p.img}" class="w-12 h-12 rounded bg-white object-contain">
                        <div class="flex-1 overflow-hidden">
                            <p class="text-xs font-bold truncate">${p.name}</p>
                            <p class="text-amber-500 text-[10px]">${p.price} د.ج</p>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button onclick="editProduct('${id}')" class="text-blue-400 p-1"><i class="fas fa-edit text-xs"></i></button>
                            <button onclick="deleteProduct('${id}')" class="text-red-500 p-1"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function deleteProduct(id) { if(confirm("حذف السلعة نهائياً؟")) db.ref('products/' + id).remove(); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        
        // بقية دوال السلة (addToCart, updateCartUI, الخ) تبقى كما هي من السكريبت السابق لضمان استقرار العمل
    </script>
</body>
</html>
