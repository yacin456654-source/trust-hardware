<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST HARDWARE | ثقة وضمان</title>
    <link rel="icon" type="image/jpg" href="https://scontent.floo1-2.fna.fbcdn.net/v/t39.30808-1/682006759_122095180376344266_5380399349240977356_n.jpg?stp=dst-jpg_s160x160_tt6&_nc_cat=104&ccb=1-7&_nc_sid=1d2534&_nc_ohc=F8ArBc2in4EQ7kNvwE59jEr&_nc_oc=AdqSQL9UW2FqvMmynIS3b37eom0-7urCMfI_exNmQI6jFgPBaGKlTXf6n0n4kbbp_E0&_nc_zt=24&_nc_ht=scontent.floo1-2.fna&_nc_gid=Tn2WacjLMDww-TRhwhXfBA&_nc_ss=7b2a8&oh=00_Af3Zi8oEiwkhfktys-FC-pbJ5jPVQXbpR0mp8Sju-TaCTg&oe=69F59C1A">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:ital@1&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .product-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: 0.3s; }
        .product-card:hover { border-color: #f59e0b; transform: translateY(-5px); }
        .cart-badge { position: fixed; bottom: 20px; left: 20px; background: #f59e0b; color: black; padding: 15px 25px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; overflow-y: auto; }
        .admin-section { display: none; background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid #f59e0b; margin: 20px auto; max-width: 1300px; }
        .order-input { color: black !important; background: white !important; font-weight: bold; border: 2px solid #334155; padding: 10px; border-radius: 8px; width: 100%; }
        .cat-btn { background: #334155; padding: 8px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .cat-btn.active { background: #f59e0b; color: black; font-weight: bold; }
        .secret-trigger { width: 30px; height: 30px; background: #f59e0b; border-radius: 8px; cursor: pointer; opacity: 0.2; transition: 0.3s; }
        .secret-trigger:hover { opacity: 0.8; }
        .promise-text { font-family: 'Amiri', serif; line-height: 1.6; border-top: 1px solid #334155; padding-top: 10px; margin-top: 15px; }
        .contact-info { font-size: 11px; color: #cbd5e1; }
    </style>
</head>
<body>

    <header class="bg-slate-900 border-b border-amber-500 sticky top-0 z-50 p-3 shadow-xl">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-start">
                <div class="flex items-center gap-3">
                    <img src="https://scontent.floo1-2.fna.fbcdn.net/v/t39.30808-1/682006759_122095180376344266_5380399349240977356_n.jpg?stp=dst-jpg_s160x160_tt6&_nc_cat=104&ccb=1-7&_nc_sid=1d2534&_nc_ohc=F8ArBc2in4EQ7kNvwE59jEr&_nc_oc=AdqSQL9UW2FqvMmynIS3b37eom0-7urCMfI_exNmQI6jFgPBaGKlTXf6n0n4kbbp_E0&_nc_zt=24&_nc_ht=scontent.floo1-2.fna&_nc_gid=Tn2WacjLMDww-TRhwhXfBA&_nc_ss=7b2a8&oh=00_Af3Zi8oEiwkhfktys-FC-pbJ5jPVQXbpR0mp8Sju-TaCTg&oe=69F59C1A" class="h-12 w-12 rounded-full border border-amber-500">
                    <div>
                        <h1 class="text-lg font-bold text-amber-500 leading-none">TRUST HARDWARE</h1>
                        <div class="contact-info mt-1 flex flex-col">
                            <span><i class="fas fa-phone-alt text-amber-500 ml-1"></i> 0659992619</span>
                            <a href="https://www.facebook.com/profile.php?id=61560327990792" target="_blank" class="hover:text-amber-500 transition">
                                <i class="fab fa-facebook text-amber-500 ml-1"></i> صفحتنا على الفيسبوك
                            </a>
                        </div>
                    </div>
                </div>
                <div id="admin-trigger" onclick="handleSecretClick()" class="secret-trigger md:hidden"></div>
            </div>

            <div class="flex-1 max-w-lg relative w-full">
                <input type="text" id="mainSearch" onkeyup="filterProducts()" placeholder="ابحث عن أداة..." class="w-full bg-slate-800 border border-slate-700 rounded-full py-2 px-10 focus:border-amber-500 outline-none text-white text-center">
                <i class="fas fa-search absolute right-4 top-3 text-slate-500"></i>
            </div>

            <div id="admin-trigger-pc" onclick="handleSecretClick()" class="secret-trigger hidden md:block"></div>
        </div>
    </header>

    <div class="container mx-auto px-4 mt-6 overflow-x-auto">
        <div id="categories-bar" class="flex gap-3 justify-start md:justify-center pb-2"></div>
    </div>

    <section id="admin-panel" class="container mx-auto admin-section shadow-2xl">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
            <h2 class="text-2xl font-bold text-amber-500">لوحة الإدارة السحابية</h2>
            <button onclick="closeAdmin()" class="bg-red-600 px-4 py-1 rounded text-sm">إغلاق</button>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="bg-slate-800 p-4 rounded-xl border border-amber-500/30">
                    <p class="text-xs text-amber-400 font-bold mb-2 uppercase">1. إضافة مجلد جديد:</p>
                    <div class="flex gap-2">
                        <input type="text" id="new-cat-name" placeholder="اسم المجلد" class="order-input">
                        <button onclick="addNewCategory()" class="bg-blue-600 px-6 rounded-lg font-bold">إضافة</button>
                    </div>
                </div>
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="text-xs text-amber-400 font-bold mb-2 uppercase">2. نشر سلعة جديدة:</p>
                    <select id="p-cat-select" class="order-input mb-2"></select>
                    <input type="text" id="p-name" placeholder="اسم السلعة" class="order-input mb-2">
                    <input type="number" id="p-price" placeholder="السعر د.ج" class="order-input mb-2">
                    <input type="text" id="p-img" placeholder="رابط الصورة" class="order-input mb-2">
                    <button onclick="addNewProduct()" class="w-full bg-amber-500 text-black py-3 rounded-lg font-bold">نشر السلعة</button>
                </div>
            </div>
            <div class="bg-slate-900 p-6 rounded-xl border border-slate-700 shadow-inner">
                <h3 class="text-amber-500 font-bold mb-4 underline">الطلبات الواردة:</h3>
                <div id="orders-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></div>
            </div>
        </div>
        <div class="mt-8 border-t border-slate-700 pt-4">
            <h3 class="text-amber-500 font-bold mb-4">إدارة السلع الحالية (للحذف):</h3>
            <div id="admin-products-list" class="grid grid-cols-2 md:grid-cols-5 gap-2"></div>
        </div>
    </section>

    <main class="container mx-auto px-4 py-8">
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </main>

    <div id="cart-badge" class="cart-badge" onclick="openCartModal()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span> | <span id="cart-total">0</span> د.ج
    </div>

    <div id="cart-modal" class="modal">
        <div class="bg-slate-900 border-2 border-amber-500 w-full max-w-xl rounded-3xl p-6 relative mx-4">
            <h2 class="text-xl font-bold text-amber-500 mb-4 text-center">تأكيد طلبك</h2>
            <div id="cart-items-list" class="mb-4 space-y-2 max-h-40 overflow-y-auto border-b border-slate-700 pb-2"></div>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="c-fname" placeholder="الاسم" class="order-input">
                    <input type="text" id="c-lname" placeholder="اللقب" class="order-input">
                </div>
                <input type="tel" id="c-phone" placeholder="رقم الهاتف" class="order-input text-center">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="c-wilaya" placeholder="الولاية" class="order-input">
                    <input type="text" id="c-commune" placeholder="البلدية" class="order-input">
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="delivery-option flex items-center gap-2" onclick="toggleAddressField(false)">
                        <input type="radio" name="delivery" id="to-office" checked>
                        <label for="to-office">مكتب التوصيل</label>
                    </div>
                    <div class="delivery-option flex items-center gap-2" onclick="toggleAddressField(true)">
                        <input type="radio" name="delivery" id="to-home">
                        <label for="to-home">بَاب المنزل</label>
                    </div>
                </div>
                <div id="home-address-container" style="display: none;">
                    <input type="text" id="c-home-address" placeholder="العنوان بالتفصيل..." class="order-input">
                </div>
                <div class="text-center p-3 bg-slate-800 rounded-xl border border-amber-500/20">
                    <p class="promise-text text-[11px] text-slate-300 italic">
                        "أعدكم بأنني سوف أستلم الطلبية... {والمُوفُون بعَهْدِهِمْ إذَا عَاهَدُوا}"
                    </p>
                </div>
                <button onclick="submitFinalOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-lg">تأكيد الشراء</button>
                <button onclick="closeCartModal()" class="w-full text-slate-500 text-xs mt-1">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBDxdhBktG-DanMbZq8k7cVg7bgY3NnQkk",
            authDomain: "trust-hardware.firebaseapp.com",
            databaseURL: "https://trust-hardware-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "trust-hardware",
            storageBucket: "trust-hardware.firebasestorage.app",
            messagingSenderId: "801438773757",
            appId: "1:801438773757:web:85c57fcfdd13c0eaf3a994"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = {};
        let allCategories = [];
        let cart = [];
        let currentFilter = 'all';
        let clickCount = 0;

        // ميزة الأمان: الضغط 5 مرات على المربع الأصفر السري
        function handleSecretClick() {
            clickCount++;
            if (clickCount === 5) {
                clickCount = 0;
                if(prompt("كلمة السر الإدارية:") === "yacin..yacin.") {
                    document.getElementById('admin-panel').style.display = 'block';
                    window.scrollTo(0, 0);
                }
            }
            setTimeout(() => { clickCount = 0; }, 3000);
        }

        // مزامنة البيانات من Firebase
        db.ref('categories').on('value', (snap) => {
            allCategories = snap.val() ? Object.values(snap.val()) : ["أدوات يدوية", "كهرباء"];
            renderCategories();
            updateCatSelect();
        });

        db.ref('products').on('value', (snap) => {
            allProducts = snap.val() || {};
            renderProducts();
            renderAdminProducts();
        });

        db.ref('orders').on('value', (snap) => {
            const orders = snap.val() || {};
            const list = document.getElementById('orders-list');
            let html = "";
            Object.keys(orders).reverse().forEach(id => {
                const o = orders[id];
                html += `
                    <div class="bg-slate-800 p-4 rounded-xl border-r-4 border-amber-500 relative mb-4">
                        <button onclick="deleteOrder('${id}')" class="absolute left-2 top-2 text-red-500"><i class="fas fa-trash"></i></button>
                        <p class="text-amber-500 font-bold text-xs underline">السلع: ${o.items}</p>
                        <p class="text-white text-sm font-bold">${o.customer} (${o.phone})</p>
                        <p class="text-slate-400 text-[10px]">${o.address} | ${o.delivery}</p>
                        <p class="text-green-400 font-bold text-xs">المجموع: ${o.total} د.ج</p>
                    </div>`;
            });
            list.innerHTML = html || "لا يوجد طلبات حالياً";
        });

        function renderCategories() {
            const bar = document.getElementById('categories-bar');
            let html = `<div onclick="filterByCategory('all')" class="cat-btn ${currentFilter === 'all' ? 'active' : ''}">الكل</div>`;
            allCategories.forEach(cat => {
                html += `<div onclick="filterByCategory('${cat}')" class="cat-btn ${currentFilter === cat ? 'active' : ''}">${cat}</div>`;
            });
            bar.innerHTML = html;
        }

        function filterByCategory(cat) { currentFilter = cat; renderProducts(); renderCategories(); }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const q = document.getElementById('mainSearch').value.toLowerCase();
            let html = "";
            
            Object.keys(allProducts).forEach(id => {
                const p = allProducts[id];
                const matchesCat = currentFilter === 'all' || p.category === currentFilter;
                const matchesSearch = p.name.toLowerCase().includes(q);

                if (matchesCat && matchesSearch) {
                    html += `
                        <div class="product-card p-4 text-center">
                            <span class="text-[9px] text-amber-500 block mb-1">${p.category || 'عام'}</span>
                            <img src="${p.img}" class="h-32 mx-auto mb-3 object-contain bg-white rounded p-2">
                            <h3 class="font-bold text-sm h-10 overflow-hidden">${p.name}</h3>
                            <p class="text-amber-500 font-bold text-lg my-2">${p.price} د.ج</p>
                            <button onclick="addToCart('${id}')" class="w-full bg-amber-500 text-black font-bold py-2 rounded-lg text-xs">أضف للسلة</button>
                        </div>`;
                }
            });
            grid.innerHTML = html || `<p class="col-span-full text-center py-10 opacity-50">لا توجد سلع متوفرة..</p>`;
        }

        function renderAdminProducts() {
            const list = document.getElementById('admin-products-list');
            let html = "";
            Object.keys(allProducts).forEach(id => {
                html += `
                    <div class="bg-slate-700 p-2 rounded text-[10px] flex justify-between items-center">
                        <span class="truncate w-20">${allProducts[id].name}</span>
                        <button onclick="deleteProduct('${id}')" class="text-red-500"><i class="fas fa-times"></i></button>
                    </div>`;
            });
            list.innerHTML = html;
        }

        function filterProducts() { renderProducts(); }
        function updateCatSelect() {
            const select = document.getElementById('p-cat-select');
            select.innerHTML = `<option value="عام">بدون مجلد</option>` + allCategories.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function addNewCategory() {
            const name = document.getElementById('new-cat-name').value;
            if(name) { db.ref('categories').push(name); document.getElementById('new-cat-name').value = ''; }
        }

        function addNewProduct() {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, img = document.getElementById('p-img').value, cat = document.getElementById('p-cat-select').value;
            if(n && p) {
                db.ref('products').push({ name: n, price: p, img: img, category: cat });
                alert("تمت الإضافة بنجاح!");
            }
        }

        function addToCart(id) { cart.push(allProducts[id]); updateCartUI(); }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + Number(item.price), 0);
            document.getElementById('cart-total').innerText = total;
            document.getElementById('cart-items-list').innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-slate-800 p-2 rounded text-[10px]">
                    <span>${item.name}</span>
                    <button onclick="removeFromCart(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }
        function removeFromCart(i) { cart.splice(i, 1); updateCartUI(); }
        function openCartModal() { if(cart.length > 0) document.getElementById('cart-modal').style.display = 'flex'; }
        function closeCartModal() { document.getElementById('cart-modal').style.display = 'none'; }
        function toggleAddressField(show) { document.getElementById('home-address-container').style.display = show ? 'block' : 'none'; }

        function submitFinalOrder() {
            const f = document.getElementById('c-fname').value, ph = document.getElementById('c-phone').value, w = document.getElementById('c-wilaya').value, c = document.getElementById('c-commune').value;
            if(!f || !ph || !w || !c) return alert("أكمل البيانات");
            
            const isHome = document.getElementById('to-home').checked;
            const del = isHome ? "للبيت: " + document.getElementById('c-home-address').value : "للمكتب";

            db.ref('orders').push({
                customer: f + " " + document.getElementById('c-lname').value,
                phone: ph,
                address: w + " | " + c,
                delivery: del,
                items: cart.map(i => i.name).join(' + '),
                total: document.getElementById('cart-total').innerText,
                time: new Date().toLocaleString()
            }).then(() => {
                cart = []; updateCartUI(); closeCartModal();
                alert("تم إرسال الطلب بنجاح!");
            });
        }

        function deleteProduct(id) { if(confirm("حذف السلعة نهائياً؟")) db.ref('products/' + id).remove(); }
        function deleteOrder(id) { if(confirm("حذف الطلب؟")) db.ref('orders/' + id).remove(); }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    </script>
</body>
</html>
